<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racer Reader | Lectura a la Velocidad de la Luz</title>
    <meta name="description" content="Una experiencia de lectura inmersiva con estética retro-synthwave. Las palabras viajan desde el horizonte hacia ti.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@700&family=Space+Mono&family=EB+Garamond:wght@400;700&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #00d4ff;
            --accent: #bc13fe;
            --bg-deep: #050b18;
            --bg-glass: rgba(18, 25, 41, 0.7);
            --text-neon: #fff;
            --font-main: 'Outfit', sans-serif;
            --font-hdr: 'Space Grotesk', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --text-color: #ffffff;
            --glow-color: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .app-container {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- Background Effects --- */
        .background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            perspective: 1000px;
            overflow: hidden;
            background: linear-gradient(to bottom, #050b18 0%, #1a0b2e 50%, #4a0b3e 100%);
        }

        .sun {
            position: absolute;
            bottom: 45%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: linear-gradient(to bottom, #ff007f, #ffcc33);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255, 0, 127, 0.6);
            mask-image: linear-gradient(to bottom, black 0%, black 80%, transparent 80%, transparent 85%, black 85%, black 90%, transparent 90%, transparent 95%, black 95%);
            transition: var(--transition);
        }

        .horizon-glow {
            position: absolute;
            bottom: 45%;
            width: 100%;
            height: 4px;
            background: white;
            box-shadow: 0 0 20px 2px var(--primary);
            z-index: 1;
        }

        .grid-floor {
            position: absolute;
            top: 55%;
            left: -50%;
            width: 200%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(75deg);
            transform-origin: top center;
            animation: grid-move 2s linear infinite;
        }

        /* --- Particle System Box --- */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        /* --- Skins --- */
        /* GRID MOVEMENT */
        @keyframes grid-move {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* --- Skins --- */
        /* SYNTHWAVE (Standard) */
        .skin-synthwave .background-wrapper { background: linear-gradient(to bottom, #050b18 0%, #1a0b2e 50%, #4a0b3e 100%); }

        /* CYBERPUNK SKIN */
        .skin-cyberpunk .background-wrapper { background: linear-gradient(to bottom, #050510 0%, #0a0a20 100%); }
        .skin-cyberpunk .sun { display: none; }
        .skin-cyberpunk .horizon-glow { background: #00ffcc; box-shadow: 0 0 20px #00ffcc; }
        .skin-cyberpunk .grid-floor { background-image: linear-gradient(rgba(0, 255, 204, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.2) 1px, transparent 1px); }

        /* SPACE SKIN */
        .skin-space .background-wrapper { background: radial-gradient(circle at center, #0a0b1e 0%, #000000 100%); }
        .skin-space .sun { display: none; }
        .skin-space .horizon-glow { opacity: 0.1; }
        .skin-space .grid-floor { opacity: 0; }

        /* MATRIX SKIN */
        .skin-matrix .background-wrapper { background: black; }
        .skin-matrix .sun { display: none; }
        .skin-matrix .horizon-glow { background: #00ff41; box-shadow: 0 0 20px #00ff41; }
        .skin-matrix .grid-floor { background-image: linear-gradient(rgba(0, 255, 65, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 65, 0.2) 1px, transparent 1px); }
        .skin-matrix .word-node { color: #00ff41; text-shadow: 0 0 10px #00ff41; }

        /* SUNRISE SKIN */
        .skin-sunrise .background-wrapper { background: linear-gradient(to bottom, #87ceeb 0%, #fdb813 100%); }
        .skin-sunrise .sun { display: block; background: #fff; box-shadow: 0 0 50px #fff; mask-image: none; top: 10%; width: 100px; height: 100px; }
        .skin-sunrise .horizon-glow { background: white; }
        .skin-sunrise .grid-floor { background-image: linear-gradient(rgba(255, 255, 255, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.5) 1px, transparent 1px); }
        .skin-sunrise .word-node { color: #222; text-shadow: none; opacity: 0.8 !important; }

        /* --- Reading Stage --- */
        .reading-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transform-style: preserve-3d;
            perspective: var(--perspective, 1000px);
        }

        .perspective-container {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-node {
            position: absolute;
            font-family: var(--font-hdr);
            font-weight: 700;
            font-size: var(--font-size, 60px);
            color: var(--text-color);
            opacity: 0;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px var(--glow-color), var(--text-3d-shadow, 0 0 0 transparent);
            pointer-events: none;
            will-change: transform, opacity;
        }

        .focus-marker {
            position: absolute;
            width: 200px;
            height: 10px;
            border-bottom: 2px solid var(--glow-color);
            bottom: 48%; /* Slightly below the center point */
            box-shadow: 0 4px 10px var(--glow-color);
            opacity: 0.5;
        }

        /* --- UI Overlay --- */
        .ui-overlay {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: linear-gradient(transparent, rgba(5, 11, 24, 0.9));
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-hdr);
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: var(--secondary);
        }

        .logo span { color: var(--primary); }

        .stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: right;
            display: flex;
            flex-direction: column;
        }

        .stat-item .label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .stat-item .value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* --- Controls --- */
        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--bg-glass);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 0.8rem 1.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            border-radius: 4px;
            min-width: 120px;
            text-align: center;
        }

        .btn:hover {
            box-shadow: 0 0 15px var(--secondary);
            background: var(--secondary);
            color: var(--bg-deep);
        }

        .btn-primary {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px var(--primary);
            background: var(--primary);
            color: white;
        }

        .btn-glow {
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 0 20px var(--primary);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .setting {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .setting label {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--secondary);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px var(--secondary);
        }

        /* --- Progress Bar --- */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 5px var(--secondary);
        }

        /* Hide UI when reading might be a cool feature later */
        .reading .ui-overlay {
            opacity: 0.3;
            transition: opacity 0.5s;
        }
        .reading .ui-overlay:hover {
            opacity: 1;
        }

        .settings-collapsed .settings-grid {
            display: none;
        }

        .settings-collapsed .ui-overlay {
            gap: 0.8rem;
        }

        .btn-toggle-settings {
            background: transparent !important;
            border-color: rgba(0, 212, 255, 0.3) !important;
            color: rgba(0, 212, 255, 0.5) !important;
        }

        .btn-toggle-settings:hover {
            border-color: var(--secondary) !important;
            color: var(--secondary) !important;
        }

        #text-input:focus {
            outline: none;
            box-shadow: 0 0 15px var(--secondary);
            border-color: var(--secondary);
        }

    </style>
</head>
<body>
    <div class="app-container" id="app">
        <div class="background-wrapper">
            <div class="sun"></div>
            <div class="horizon-glow"></div>
            <div class="grid-floor" id="grid"></div>
            <div class="particles-container" id="particles-host"></div>
        </div>

        <main class="reading-stage" id="reading-stage">
            <div class="perspective-container" id="word-holder">
                <!-- Words go here -->
            </div>
            <div class="focus-marker"></div>
        </main>

        <div class="ui-overlay">
            <header>
                <h1 class="logo">RETRO<span>RACER</span></h1>
                <div class="stats">
                    <div class="stat-item">
                        <span class="label">PROGRESO</span>
                        <div style="display:flex; align-items: baseline; gap: 4px;">
                            <span class="value" id="current-word-index">0</span>
                            <span style="color: rgba(255,255,255,0.3); font-size: 0.7rem;">/ <span id="total-words">0</span></span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <span class="label">VELOCIDAD</span>
                        <div style="display:flex; align-items: baseline; gap: 4px;">
                            <span class="value" id="wpm-display">300</span>
                            <span style="color: rgba(255,255,255,0.3); font-size: 0.7rem;">WPM</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="progress-container">
                <input type="range" id="progress-jump" min="0" max="100" value="0" style="position: absolute; top: -5px; width: 100%; height: 15px; opacity: 0; cursor: pointer; z-index: 20;">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <nav class="controls-panel">
                <div class="control-group">
                    <label for="file-upload" class="btn btn-primary" style="display: inline-block;">
                        CARGAR ARCHIVO
                        <input type="file" id="file-upload" accept=".txt,.pdf" hidden>
                    </label>
                    <button class="btn btn-primary" id="paste-text-btn">PEGAR TEXTO</button>
                    <button class="btn btn-secondary" id="play-btn">PLAY</button>
                    <button class="btn btn-secondary" id="reset-btn">REINICIAR</button>
                    <select id="reading-mode" class="btn btn-primary" style="width: auto; min-width: 140px; padding: 0.8rem 1rem;">
                        <option value="word">PALABRAS</option>
                        <option value="syllable" selected>SÍLABAS</option>
                        <option value="mixed">MIXTO</option>
                    </select>
                    <button class="btn btn-toggle-settings" id="toggle-settings-btn" title="Mostrar/ocultar configuración">AJUSTES ⚙</button>
                </div>

                <div id="text-input-container" style="display: none; flex-direction: column; gap: 10px; max-width: 900px; margin: 0 auto; width: 100%;">
                    <textarea id="text-input" placeholder="Pega tu texto aquí..." style="width: 100%; height: 150px; background: var(--bg-glass); border: 1px solid var(--secondary); color: white; padding: 1rem; font-family: var(--font-main); border-radius: 4px; resize: none;"></textarea>
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button class="btn btn-secondary" id="cancel-text-btn">CANCELAR</button>
                        <button class="btn btn-glow" id="apply-text-btn">CARGAR TEXTO</button>
                    </div>
                </div>

                <div class="settings-grid">
                    <div class="setting">
                        <label>WPM (VELOCIDAD)</label>
                        <input type="range" id="wpm-range" min="100" max="1500" step="10" value="300">
                    </div>
                    <div class="setting">
                        <label>VARIABILIDAD DE VELOCIDAD (%)</label>
                        <input type="range" id="variability-range" min="0" max="100" step="5" value="0">
                    </div>
                    <div class="setting">
                        <label>ENTORNO / SKIN</label>
                        <select id="skin-selector" class="btn" style="width: 100%; min-width: 0; padding: 5px;">
                            <option value="skin-synthwave">SYNTHWAVE</option>
                            <option value="skin-cyberpunk">CYBERPUNK</option>
                            <option value="skin-space">ESPACIO</option>
                            <option value="skin-matrix">MATRIX</option>
                            <option value="skin-sunrise">AMANECER</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label>DIBUJO DE PARTÍCULAS</label>
                        <select id="particle-style" class="btn" style="width: 100%; min-width: 0; padding: 5px;">
                            <option value="stars">ESTRELLAS</option>
                            <option value="streaks">ESTELAS</option>
                            <option value="snow">NIEVE (CAÍDA)</option>
                            <option value="neon">PUNTOS NEÓN</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label>CANTIDAD PARTÍCULAS</label>
                        <input type="range" id="particles-range" min="0" max="300" step="10" value="50">
                    </div>
                    <div class="setting">
                        <label>TAMAÑO FUENTE</label>
                        <input type="range" id="font-size-range" min="20" max="150" step="5" value="70">
                    </div>
                    <div class="setting">
                        <label>TIPO DE LETRA</label>
                        <select id="font-selector" class="btn" style="width: 100%; min-width: 0; padding: 5px;">
                            <option value="Outfit, sans-serif">MODERNA (Outfit)</option>
                            <option value="Space Grotesk, sans-serif">GEOMÉTRICA (Space)</option>
                            <option value="Space Mono, monospace">MONO (Retro Code)</option>
                            <option value="EB Garamond, serif">ELEGANTE (Serif)</option>
                            <option value="Bungee, cursive">3D RETRO (Bungee)</option>
                            <option value="Georgia, serif">CLÁSICA</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label>PROFUNDIDAD (3D)</label>
                        <input type="range" id="depth-range" min="500" max="3000" step="100" value="1200">
                    </div>
                    <div class="setting">
                        <label>CURVA / MOVIMIENTO</label>
                        <input type="range" id="sway-range" min="0" max="400" step="10" value="100">
                    </div>
                    <div class="setting">
                        <label>ESTILO DE CURVA</label>
                        <select id="sway-type" class="btn" style="width: 100%; min-width: 0; padding: 5px;">
                            <option value="dynamic">DINÁMICA (OSCILANTE)</option>
                            <option value="fixed">FIJA (ESTÁTICA)</option>
                            <option value="straight">RECTA TOTAL</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label>VISTA PREVIA (PALABRAS)</label>
                        <input type="range" id="lookahead-range" min="1" max="15" step="1" value="8">
                    </div>
                    <div class="setting">
                        <label>DESENFOQUE DISTANCIA</label>
                        <input type="range" id="blur-range" min="0" max="20" step="1" value="5">
                    </div>
                    <div class="setting">
                        <label>ALTURA / ÁNGULO DE ENTRADA</label>
                        <input type="range" id="origin-angle-range" min="-1000" max="1000" step="50" value="0">
                    </div>
                    <div class="setting">
                        <label>POSICIÓN (LECTURA)</label>
                        <input type="range" id="position-manual" min="0" max="100" step="1" value="0">
                    </div>
                    <div class="setting">
                        <label>COLOR DE LETRA</label>
                        <input type="color" id="font-color-picker" value="#ffffff" style="height: 30px; border: none; background: transparent; cursor: pointer; width: 100%;">
                    </div>
                    <div class="setting">
                        <label>COLOR DE EFECTO</label>
                        <input type="color" id="effect-color-picker" value="#00d4ff" style="height: 30px; border: none; background: transparent; cursor: pointer; width: 100%;">
                    </div>
                </div>
            </nav>
        </div>
    </div>

    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
